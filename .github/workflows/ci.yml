name: Quality CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Install task runner
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run lint
        run: task lint

      - name: Run check
        run: task check

      - name: Run task build
        run: task build

      - name: Validate GoReleaser config
        if: runner.os == 'Linux'
        run: task release:goreleaser:check

      - name: Run tests
        run: go test -v ./...
