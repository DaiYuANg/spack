name: Quality CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Install task runner
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -d

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run lint
        run: ./bin/task lint

      - name: Run check
        run: ./bin/task check

      - name: Run task build
        run: ./bin/task build

      - name: Run tests
        run: go test -v ./...
