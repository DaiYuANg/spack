name: Docker Release

on:
  workflow_run:
    workflows:
      - Quality CI
    types:
      - completed

jobs:
  docker-release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Install task runner
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -d

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Resolve release version from branch
        id: version
        run: |
          echo "value=${GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH#release/}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images with Taskfile
        run: |
          ./bin/task build:docker VERSION=${{ steps.version.outputs.value }}
