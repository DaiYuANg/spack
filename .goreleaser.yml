version: 2

project_name: spack

before:
  hooks:
    - go mod tidy

builds:
  - id: spack-linux
    main: .
    binary: spack
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

  - id: spack-cross
    main: .
    binary: spack
    goos:
      - darwin
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - ids:
      - spack-linux
      - spack-cross
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}Darwin
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}
      {{- end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}
      {{- end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-snapshot"

dockers_v2:
  - id: alpine
    ids:
      - spack-linux
    dockerfile: docker/alpine.Dockerfile
    images:
      - daiyuang/spack
    tags:
      - "{{ .Version }}"
      - latest
      - alpine
      - alpine-{{ .Version }}

  - id: debian
    ids:
      - spack-linux
    dockerfile: docker/debian.Dockerfile
    images:
      - daiyuang/spack
    tags:
      - debian
      - debian-{{ .Version }}
