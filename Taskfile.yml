# https://taskfile.dev

version: '3'

vars:
  BIN_NAME: spack
  DIST_DIR: dist
  # 默认平台
  DEFAULT_GOOS: linux
  DEFAULT_GOARCH: amd64
  DOCKERHUB_REPO: daiyuang/{{.BIN_NAME}}
  CONTAINER_PLATFORM: linux/amd64,linux/arm64
tasks:
  dev:
    desc: development
    cmds:
      - cd test && pnpm build
      - go tool air .

  test:
    cmds:
      - go test ./...

  clean:
    cmds:
      - rm -rf {{.DIST_DIR}}

  build:
    desc: 构建当前平台（默认启用 CGO）
    cmds:
      - go build -trimpath -ldflags="-s -w -X main.Version={{.GIT_COMMIT}}" -o {{.DIST_DIR}}/{{.BIN_NAME}} .
    vars:
      GIT_COMMIT:
        sh: git log -n 1 --format=%h

  build:all:
    desc: 构建所有平台（含 CGO）
    deps: [ build:linux, build:darwin, build:windows ]

  build:linux:
    desc: 构建 Linux 版本（带 CGO）
    deps: [ clean ]
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - mkdir -p {{.DIST_DIR}}/linux
      - go build -trimpath -ldflags="-s -w" -o {{.DIST_DIR}}/linux/{{.BIN_NAME}} .

  build:darwin:
    desc: 构建 macOS 版本（带 CGO）
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - mkdir -p {{.DIST_DIR}}/darwin
      - go build -trimpath -ldflags="-s -w" -o {{.DIST_DIR}}/darwin/{{.BIN_NAME}} .
    deps: [ clean ]


  build:windows:
    desc: 构建 Windows 版本（带 CGO）
    deps: [ clean ]
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - mkdir -p {{.DIST_DIR}}/windows
      - go build -trimpath -ldflags="-s -w" -o {{.DIST_DIR}}/windows/{{.BIN_NAME}}.exe .

  build:docker:alpine:
    desc: 构建 Alpine 运行时镜像
    cmds:
      - |
        docker buildx build \
          --target alpine \
          --platform {{.CONTAINER_PLATFORM}} \
          -t {{.DOCKERHUB_REPO}}:alpine \
          -t {{.DOCKERHUB_REPO}}:latest \
          -t {{.DOCKERHUB_REPO}}:{{.RELEASE_VERSION}} \
          -t {{.DOCKERHUB_REPO}}:alpine-{{.RELEASE_VERSION}} \
          -t {{.DOCKERHUB_REPO}}:alpine-{{.GIT_COMMIT}} \
          --push \
          .
    vars:
      GIT_COMMIT:
        sh: git log -n 1 --format=%h
      AUTO_RELEASE_VERSION:
        sh: go run ./scripts/release latest-no-v
      RELEASE_VERSION: '{{default .AUTO_RELEASE_VERSION .VERSION}}'

  build:docker:debian:
    desc: 构建 Debian Slim 运行时镜像
    cmds:
      - |
        docker buildx build \
          --target debian \
          --platform {{.CONTAINER_PLATFORM}} \
          -t {{.DOCKERHUB_REPO}}:debian \
          -t {{.DOCKERHUB_REPO}}:debian-{{.RELEASE_VERSION}} \
          -t {{.DOCKERHUB_REPO}}:debian-{{.GIT_COMMIT}} \
          --push \
          .
    vars:
      GIT_COMMIT:
        sh: git log -n 1 --format=%h
      AUTO_RELEASE_VERSION:
        sh: go run ./scripts/release latest-no-v
      RELEASE_VERSION: '{{default .AUTO_RELEASE_VERSION .VERSION}}'

  build:docker:
    desc: build container
    deps: [ build:docker:alpine,build:docker:debian ]

  check:
    cmds:
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  lint:
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run

  release:tag:
    desc: "创建注释标签（用法: task release:tag VERSION=0.1.0）"
    requires:
      vars: [ VERSION ]
    vars:
      TAG: '{{if hasPrefix .VERSION "v"}}{{.VERSION}}{{else}}v{{.VERSION}}{{end}}'
    cmds:
      - git tag -a {{.TAG}} -m "release {{.TAG}}"

  release:goreleaser:check:
    desc: "校验 .goreleaser.yml 配置"
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@latest check

  release:goreleaser:snapshot:
    desc: "使用 GoReleaser 执行本地快照构建（不发布）"
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean --skip=publish

  release:
    desc: "创建并推送标签（用法: task release VERSION=0.1.0）"
    requires:
      vars: [ VERSION ]
    vars:
      TAG: '{{if hasPrefix .VERSION "v"}}{{.VERSION}}{{else}}v{{.VERSION}}{{end}}'
      VERSION_NO_V: '{{trimPrefix "v" .TAG}}'
      RELEASE_BRANCH: release/{{.VERSION_NO_V}}
    cmds:
      - task: release:goreleaser:check
      - task: release:tag
        vars:
          VERSION: '{{.VERSION}}'
      - git push --atomic origin {{.TAG}} HEAD:refs/heads/{{.RELEASE_BRANCH}}

  release:bump:major:
    desc: "自动递增 major 并发布（用法: task release:bump:major）"
    vars:
      VERSION:
        sh: go run ./scripts/release bump-major
    cmds:
      - task: release
        vars:
          VERSION: '{{.VERSION}}'

  release:bump:minor:
    desc: "自动递增 minor 并发布（用法: task release:bump:minor）"
    vars:
      VERSION:
        sh: go run ./scripts/release bump-minor
    cmds:
      - task: release
        vars:
          VERSION: '{{.VERSION}}'

  release:bump:patch:
    desc: "自动递增 patch 并发布（用法: task release:bump:patch）"
    vars:
      VERSION:
        sh: go run ./scripts/release bump-patch
    cmds:
      - task: release
        vars:
          VERSION: '{{.VERSION}}'
